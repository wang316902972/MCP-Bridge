name: MCP-Bridge Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --dev
          uv pip install -r tests/requirements.txt

      - name: Create test config
        run: |
          cat > ci-config.json <<'EOF'
          {
            "inference_server": {
              "base_url": "http://127.0.0.1:9/v1",
              "api_key": "test-api-key"
            },
            "mcp_servers": {},
            "logging": {
              "log_level": "INFO"
            }
          }
          EOF

      - name: Build MCP-Bridge image
        run: |
          docker build -t mcp-bridge:test .

      - name: Start MCP-Bridge service
        run: |
          docker run -d \
            --name mcp-bridge-test \
            -p 8000:8000 \
            -v "$PWD/ci-config.json:/mcp_bridge/config.json:ro" \
            -e MCP_BRIDGE__CONFIG__FILE=/mcp_bridge/config.json \
            mcp-bridge:test

      - name: Wait for services
        run: |
          echo "等待服务启动..."
          curl --retry 10 --retry-all-errors --retry-delay 3 http://localhost:8000/health

      - name: Configure environment
        run: |
          echo "MCP_BRIDGE_URL=http://localhost:8000" >> $GITHUB_ENV
          echo "TEST_API_KEY=test-api-key" >> $GITHUB_ENV

      - name: Run quick tests
        run: |
          uv run python tests/run_tests.py --fast


      - name: Run integration tests
        run: |
          uv run python tests/run_tests.py --integration

      - name: Generate coverage report
        run: |
          uv run python tests/run_tests.py --fast --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
        if: always()

      - name: Archive test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            test-results.xml
        if: always()

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run linting
        run: |
          ruff check mcp_bridge/
          ruff check tests/

      - name: Check formatting
        run: |
          ruff format --check mcp_bridge/
          ruff format --check tests/

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: mcp-bridge:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
